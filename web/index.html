<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyMap</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        canvas { width: 100%; height: 100%; display: block; }

        /* Marker overlay styles */
        .map-marker {
            position: absolute;
            transform: translate(-50%, -100%);
            pointer-events: auto;
            cursor: pointer;
            z-index: 10;
            transition: opacity 0.15s;
        }
        .map-marker[data-visible="false"] {
            opacity: 0;
            pointer-events: none;
        }
        .marker-pin {
            background: #c0392b;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font: bold 13px -apple-system, sans-serif;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            position: relative;
        }
        .marker-pin::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -6px;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: #c0392b;
        }

        .listing-popup {
            display: none;
            position: absolute;
            bottom: calc(100% + 12px);
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            width: 280px;
            overflow: hidden;
            z-index: 20;
        }
        .map-marker.selected .listing-popup { display: block; }
        .listing-popup img { width: 100%; height: 160px; object-fit: cover; }
        .listing-popup .info { padding: 12px; }
        .listing-popup .price { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .listing-popup .address { color: #666; margin-bottom: 8px; font-size: 14px; }
        .listing-popup .details { display: flex; gap: 12px; color: #444; font-size: 13px; }
        .listing-popup .details span { font-weight: 600; }

        #controls {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 30;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        #controls button {
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        #controls button:hover { background: #f5f5f5; }
    </style>
</head>
<body>
    <canvas id="polymap-canvas"></canvas>
    <div id="markers"></div>

    <div id="controls">
        <button onclick="map.setTilt(0.3)">Tilt More</button>
        <button onclick="map.setTilt(1.3)">Tilt Less</button>
        <button onclick="map.setZoom(3)">Zoom In</button>
        <button onclick="map.setZoom(0.8)">Zoom Out</button>
        <button onclick="map.setLayerVisible('trees', !treesVisible); treesVisible = !treesVisible">Toggle Trees</button>
        <button onclick="map.setLayerVisible('shadows', !shadowsVisible); shadowsVisible = !shadowsVisible">Toggle Shadows</button>
        <button onclick="map.setLayerVisible('labels', !labelsVisible); labelsVisible = !labelsVisible">Toggle Labels</button>
    </div>

    <script type="module">
        import init, { PolyMap } from './pkg/polymap.js';

        // Ensure canvas has pixel dimensions before WASM init
        const canvas = document.getElementById('polymap-canvas');
        const dpr = window.devicePixelRatio || 1;
        canvas.width = canvas.clientWidth * dpr;
        canvas.height = canvas.clientHeight * dpr;

        await init();

        // Layer toggle state
        window.treesVisible = true;
        window.shadowsVisible = true;
        window.labelsVisible = true;

        // Create the map with configuration
        window.map = new PolyMap({
            canvas: "#polymap-canvas",
            center: { lat: 40.765, lon: -73.980 },
            zoom: 0.8,
            tilt: 1.35,
        });

        // Listen for events
        map.on("ready", () => {
            console.log("PolyMap ready!");

            // Add markers after map is ready
            listings.forEach(l => map.addMarker(l.id, l.lat, l.lon));
        });

        map.on("resize", (size) => {
            console.log("Resized:", size);
        });

        // Example listings
        const listings = [
            {
                id: 'listing-1', lat: 40.764, lon: -73.978,
                price: '$4,200,000', address: '432 Park Ave, Penthouse',
                beds: 3, baths: 2.5, sqft: '3,200',
                image: 'https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=400&h=300&fit=crop'
            },
            {
                id: 'listing-2', lat: 40.766, lon: -73.982,
                price: '$1,800,000', address: '200 W 56th St, Unit 12B',
                beds: 2, baths: 2, sqft: '1,450',
                image: 'https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=400&h=300&fit=crop'
            },
            {
                id: 'listing-3', lat: 40.762, lon: -73.975,
                price: '$950,000', address: '301 E 50th St, Studio',
                beds: 0, baths: 1, sqft: '550',
                image: 'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=400&h=300&fit=crop'
            }
        ];

        // Create HTML marker elements
        const markersEl = document.getElementById('markers');
        listings.forEach(listing => {
            const el = document.createElement('div');
            el.className = 'map-marker';
            el.id = listing.id;
            el.innerHTML = `
                <div class="listing-popup">
                    <img src="${listing.image}" alt="${listing.address}">
                    <div class="info">
                        <div class="price">${listing.price}</div>
                        <div class="address">${listing.address}</div>
                        <div class="details">
                            <div><span>${listing.beds}</span> bd</div>
                            <div><span>${listing.baths}</span> ba</div>
                            <div><span>${listing.sqft}</span> sqft</div>
                        </div>
                    </div>
                </div>
                <div class="marker-pin">${listing.price}</div>
            `;
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                document.querySelectorAll('.map-marker.selected').forEach(m => {
                    if (m !== el) m.classList.remove('selected');
                });
                el.classList.toggle('selected');
            });
            markersEl.appendChild(el);
        });

        document.addEventListener('click', () => {
            document.querySelectorAll('.map-marker.selected').forEach(m => m.classList.remove('selected'));
        });

        // Position markers each frame
        map.setMarkerCallback((markers) => {
            markers.forEach(({ id, x, y, visible }) => {
                const el = document.getElementById(id);
                if (el) {
                    el.setAttribute('data-visible', visible);
                    el.style.left = x + 'px';
                    el.style.top = y + 'px';
                }
            });
        });
    </script>
</body>
</html>
